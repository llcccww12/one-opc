external_agents:
  preferred_order:
    - claude_code
    - codex
    - cursor
    - opencode

  # model_flag, new_session_flag, resume_session_flag depend on your CLI version.
  # Leave empty for CLI defaults, or set explicitly for deterministic behavior.

  codex:
    enabled: true
    command: codex
    model: ""
    model_flag: "--model"
    session_mode: auto
    session_id: ""
    new_session_flag: ""
    resume_session_flag: ""
    run_mode: interactive
    interactive_timeout_seconds: 21600
    approval_mode: auto
    extra_args: []

  cursor:
    enabled: true
    command: cursor-agent
    model: ""
    model_flag: ""
    session_mode: auto
    session_id: ""
    new_session_flag: ""
    resume_session_flag: ""
    run_mode: interactive
    interactive_timeout_seconds: 21600
    approval_mode: full-auto
    extra_args: []

  claude_code:
    enabled: true
    command: claude
    model: ""
    model_flag: "--model"
    session_mode: auto
    session_id: ""
    new_session_flag: ""
    resume_session_flag: ""
    run_mode: interactive
    interactive_timeout_seconds: 21600
    approval_mode: full-auto
    extra_args: []

  opencode:
    enabled: true
    command: opencode
    model: ""
    model_flag: "--model"
    show_thinking: true
    session_mode: auto
    session_id: ""
    new_session_flag: ""
    resume_session_flag: ""
    run_mode: interactive
    interactive_timeout_seconds: 21600
    approval_mode: full-auto
    extra_args: []

native_subagents:
  general:
    enabled: true
    model: ""
    max_iterations: 24
    default_isolation: shared
    background: false
    allowed_tools: []
  explore:
    enabled: true
    model: ""
    max_iterations: 16
    default_isolation: shared
    background: false
    allowed_tools: []
  plan:
    enabled: true
    model: ""
    max_iterations: 16
    default_isolation: shared
    background: false
    allowed_tools: []
  implement:
    enabled: true
    model: ""
    max_iterations: 24
    default_isolation: worktree
    background: false
    allowed_tools: []
  verify:
    enabled: true
    model: ""
    max_iterations: 24
    default_isolation: worktree
    background: true
    allowed_tools: []
