# Built-in channel runtime template.
# Empty `allow_from` means deny-by-default. Use `["*"]` only if you want to allow all senders.
# Install provider extras with `pip install -e .[channels-<provider>]`.
# Bridge providers:
# - whatsapp: requires a companion bridge reachable at `bridge_url`
# - mochat: requires Mochat service endpoints plus `claw_token`
channels:
  send_progress: true
  send_tool_hints: false
  telegram:
    enabled: false
    # Required: token
    token: ""
    proxy: null
    reply_to_message: false
    allow_from: []
  whatsapp:
    enabled: false
    # Required: bridge_url
    bridge_url: ws://localhost:3001
    bridge_token: ""
    allow_from: []
  discord:
    enabled: false
    # Required: token
    token: ""
    gateway_url: wss://gateway.discord.gg/?v=10&encoding=json
    intents: 37377
    group_policy: mention
    allow_from: []
  feishu:
    enabled: false
    # Required: app_id, app_secret
    app_id: ""
    app_secret: ""
    encrypt_key: ""
    verification_token: ""
    react_emoji: THUMBSUP
    allow_from: []
  mochat:
    enabled: false
    # Required: base_url, claw_token, agent_user_id
    base_url: https://mochat.io
    socket_url: ""
    socket_path: /socket.io
    socket_disable_msgpack: false
    socket_reconnect_delay_ms: 1000
    socket_max_reconnect_delay_ms: 10000
    socket_connect_timeout_ms: 10000
    refresh_interval_ms: 30000
    watch_timeout_ms: 25000
    watch_limit: 100
    retry_delay_ms: 500
    max_retry_attempts: 0
    claw_token: ""
    agent_user_id: ""
    sessions: []
    panels: []
    mention:
      require_in_groups: false
    groups: {}
    reply_delay_mode: non-mention
    reply_delay_ms: 120000
    allow_from: []
  dingtalk:
    enabled: false
    # Required: client_id, client_secret
    client_id: ""
    client_secret: ""
    allow_from: []
  email:
    enabled: false
    # Required before runtime use: consent_granted plus IMAP/SMTP credentials
    consent_granted: false
    imap_host: ""
    imap_port: 993
    imap_username: ""
    imap_password: ""
    imap_mailbox: INBOX
    imap_use_ssl: true
    smtp_host: ""
    smtp_port: 587
    smtp_username: ""
    smtp_password: ""
    smtp_use_tls: true
    smtp_use_ssl: false
    from_address: ""
    auto_reply_enabled: true
    poll_interval_seconds: 30
    mark_seen: true
    max_body_chars: 12000
    subject_prefix: "Re: "
    allow_from: []
  slack:
    enabled: false
    # Required: bot_token, app_token
    mode: socket
    webhook_path: /slack/events
    bot_token: ""
    app_token: ""
    user_token_read_only: true
    reply_in_thread: true
    react_emoji: eyes
    group_policy: mention
    group_allow_from: []
    dm:
      enabled: true
      policy: open
      allow_from: []
    allow_from: []
  qq:
    enabled: false
    # Required: app_id, secret
    app_id: ""
    secret: ""
    allow_from: []
  matrix:
    enabled: false
    # Required: homeserver, access_token, user_id
    homeserver: https://matrix.org
    access_token: ""
    user_id: ""
    device_id: ""
    e2ee_enabled: true
    sync_stop_grace_seconds: 2
    max_media_bytes: 20971520
    group_policy: open
    group_allow_from: []
    allow_room_mentions: false
    allow_from: []
